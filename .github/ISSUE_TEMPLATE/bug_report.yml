name: Bug Report
description: Report a defect in the F2 PWA
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Fill in all fields below. A complete report gets fixed faster.

  - type: dropdown
    id: section
    attributes:
      label: Which section or screen?
      options:
        - Enrollment
        - Section A — Healthcare Worker Profile
        - Section B — UHC Awareness
        - Section C — YAKAP/Konsulta
        - Section D — No Balance Billing / ZBB
        - Section E — BUCAS and GAMOT
        - Section F — Referrals and Satisfaction
        - Section G — KAP on Professional Setting
        - Section H — Task Sharing
        - Section I — Facility Support
        - Section J — Job Satisfaction
        - Review Screen
        - Sync / Submission
        - Language Switch
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Enroll with HCW ID "…"
        3. Go to Section A
        4. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened? Paste error messages or describe what was wrong.
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device type
      options:
        - Android tablet (Chrome)
        - Android phone (Chrome)
        - iPad (Safari)
        - Windows laptop (Chrome)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "e.g. v1.1.0 — shown in the top-left corner of the app"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      placeholder: Drag and drop images here, or paste a link.
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — data loss or cannot proceed
        - High — feature broken, workaround exists
        - Medium — cosmetic or minor flow issue
        - Low — typo or minor UI issue
    validations:
      required: true
