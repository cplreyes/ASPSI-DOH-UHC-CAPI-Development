name: CF Pages deploy — F2 PWA

# Replaces Cloudflare Pages' native git-integration auto-deploy, which is
# broken on this account (Issue #34: `wrangler pages project list` shows
# `Git Provider: No` for both projects, so pushes to staging/main don't
# trigger any build). Until/unless the dashboard integration is restored,
# this workflow IS the deploy mechanism.
#
# Triggers on push to staging/main only — not on PRs (deploys must be
# of merged code). Gated on the CI workflow succeeding via `workflow_run`
# so we don't ship a build that failed typecheck/lint/tests.

on:
  workflow_run:
    workflows: ["CI — F2 PWA"]
    types: [completed]
    branches: [main, staging]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      # Gate: cleanly skip (don't fail) when deploy secrets aren't configured.
      # Until CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, and VITE_F2_PROXY_URL
      # are all set in repo Settings → Secrets, the manual `wrangler pages
      # deploy` from a developer machine remains the documented fallback (see
      # `reference_wrangler_pages_deploy.md`). When the secrets land, this
      # gate passes automatically — no workflow edit required.
      - name: Verify deploy secrets are configured
        id: secrets
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROXY_URL: ${{ secrets.VITE_F2_PROXY_URL }}
        run: |
          missing=()
          [ -z "$API_TOKEN" ] && missing+=("CLOUDFLARE_API_TOKEN")
          [ -z "$ACCOUNT_ID" ] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "$PROXY_URL" ] && missing+=("VITE_F2_PROXY_URL")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning title=CF Pages auto-deploy skipped::Required secret(s) not set: ${missing[*]}. Set them in repo Settings → Secrets to enable auto-deploy. Manual \`wrangler pages deploy\` remains the fallback."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.secrets.outputs.ready == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - if: steps.secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deliverables/F2/PWA/app/package-lock.json

      - if: steps.secrets.outputs.ready == 'true'
        name: Install
        working-directory: deliverables/F2/PWA/app
        run: npm ci

      - if: steps.secrets.outputs.ready == 'true'
        name: Build
        working-directory: deliverables/F2/PWA/app
        # VITE_F2_PROXY_URL is the post-auth-rearch worker origin (Issue #45).
        # vite.config.ts fails the build fast if it's missing or REPLACE_ME.
        env:
          VITE_F2_PROXY_URL: ${{ secrets.VITE_F2_PROXY_URL }}
        run: npm run build

      - if: steps.secrets.outputs.ready == 'true'
        name: Resolve project name from branch
        id: project
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "name=f2-pwa" >> "$GITHUB_OUTPUT"
          else
            echo "name=f2-pwa-staging" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.secrets.outputs.ready == 'true'
        name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deliverables/F2/PWA/app
          command: pages deploy dist --project-name=${{ steps.project.outputs.name }} --branch=${{ github.event.workflow_run.head_branch }} --commit-hash=${{ github.event.workflow_run.head_sha }}
