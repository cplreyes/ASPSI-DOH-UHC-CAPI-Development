name: CF Pages deploy — F2 PWA

# Replaces Cloudflare Pages' native git-integration auto-deploy, which is
# broken on this account (Issue #34: `wrangler pages project list` shows
# `Git Provider: No` for both projects, so pushes to staging/main don't
# trigger any build). Until/unless the dashboard integration is restored,
# this workflow IS the deploy mechanism.
#
# Triggers on push to staging/main only — not on PRs (deploys must be
# of merged code). Gated on the CI workflow succeeding via `workflow_run`
# so we don't ship a build that failed typecheck/lint/tests.

on:
  workflow_run:
    workflows: ["CI — F2 PWA"]
    types: [completed]
    branches: [main, staging]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      # Gate: cleanly skip (don't fail) when deploy secrets aren't configured.
      # Until CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, and VITE_F2_PROXY_URL
      # are all set in repo Settings → Secrets, the manual `wrangler pages
      # deploy` from a developer machine remains the documented fallback (see
      # `reference_wrangler_pages_deploy.md`). When the secrets land, this
      # gate passes automatically — no workflow edit required.
      - name: Verify deploy secrets are configured
        id: secrets
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROXY_URL: ${{ secrets.VITE_F2_PROXY_URL }}
        run: |
          missing=()
          [ -z "$API_TOKEN" ] && missing+=("CLOUDFLARE_API_TOKEN")
          [ -z "$ACCOUNT_ID" ] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "$PROXY_URL" ] && missing+=("VITE_F2_PROXY_URL")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning title=CF Pages auto-deploy skipped::Required secret(s) not set: ${missing[*]}. Set them in repo Settings → Secrets to enable auto-deploy. Manual \`wrangler pages deploy\` remains the fallback."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.secrets.outputs.ready == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - if: steps.secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deliverables/F2/PWA/app/package-lock.json

      - if: steps.secrets.outputs.ready == 'true'
        name: Install
        working-directory: deliverables/F2/PWA/app
        run: npm ci

      - if: steps.secrets.outputs.ready == 'true'
        name: Build
        working-directory: deliverables/F2/PWA/app
        # VITE_F2_PROXY_URL is the post-auth-rearch worker origin (Issue #45).
        # vite.config.ts fails the build fast if it's missing or REPLACE_ME.
        #
        # Branch-aware (closes #282 — E4-PWA-012): main builds use the prod
        # worker URL; staging builds use the staging worker URL when the
        # VITE_F2_PROXY_URL_STAGING repo secret is set, else fall back to
        # prod URL (preserves pre-fix behavior so staging doesn't suddenly
        # fail to build before the staging secret lands). Add the staging
        # secret in repo Settings → Secrets, value:
        #   https://f2-pwa-worker-staging.hcw.workers.dev
        env:
          VITE_F2_PROXY_URL: ${{ github.event.workflow_run.head_branch == 'main' && secrets.VITE_F2_PROXY_URL || secrets.VITE_F2_PROXY_URL_STAGING || secrets.VITE_F2_PROXY_URL }}
        run: |
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Worker URL configured: $(echo $VITE_F2_PROXY_URL | sed 's|https://||' | cut -d. -f1)"
          npm run build

      - if: steps.secrets.outputs.ready == 'true'
        name: Resolve project name from branch
        id: project
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "name=f2-pwa" >> "$GITHUB_OUTPUT"
          else
            echo "name=f2-pwa-staging" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.secrets.outputs.ready == 'true'
        name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deliverables/F2/PWA/app
          command: pages deploy dist --project-name=${{ steps.project.outputs.name }} --branch=${{ github.event.workflow_run.head_branch }} --commit-hash=${{ github.event.workflow_run.head_sha }}

      # Resolve version-stamp vars for the worker deploy (#295 — keeps the
      # Versioning panel in sync with the release). Branch-aware: main targets
      # the top-level worker, staging targets [env.staging] with a -staging
      # suffix on WORKER_VERSION.
      #
      # SECURITY: these outputs are interpolated into the wrangler `command:`
      # below, which runs in a shell. `head_sha`/`head_branch` are passed via
      # env (never inlined as ${{ }} into the script), and `version` (which comes
      # from repo-controlled package.json) is validated against a strict allowlist
      # before being exposed — so no shell metacharacter can reach the command.
      - if: steps.secrets.outputs.ready == 'true'
        name: Resolve worker version vars
        id: wvars
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          VERSION=$(node -p "require('./deliverables/F2/PWA/app/package.json').version")
          if [[ ! "$VERSION" =~ ^[0-9A-Za-z._+-]+$ ]]; then
            echo "::error::Refusing to deploy — package.json version '$VERSION' has unexpected characters"; exit 1
          fi
          SHA_SHORT="${HEAD_SHA:0:7}"
          if [[ ! "$SHA_SHORT" =~ ^[0-9a-fA-F]{7}$ ]]; then
            echo "::error::Unexpected head_sha '$HEAD_SHA'"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          if [ "$HEAD_BRANCH" = "main" ]; then
            echo "env_flag=" >> "$GITHUB_OUTPUT"
            echo "worker_version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "env_flag=--env staging" >> "$GITHUB_OUTPUT"
            echo "worker_version=${VERSION}-staging" >> "$GITHUB_OUTPUT"
          fi

      # Deploy the Worker via the SAME cloudflare/wrangler-action used for Pages
      # above — one consistent auth path. wranglerVersion is pinned to match the
      # repo's local toolchain and to avoid wrangler-4's "no target environment
      # specified" ambiguity on the main top-level deploy.
      #
      # NOTE: the CLOUDFLARE_API_TOKEN must carry BOTH `Cloudflare Pages: Edit`
      # AND `Workers Scripts: Edit`. A Pages-only token deploys the frontend but
      # fails here with `Authentication error [code: 10000]` (the recurring
      # failure this step previously hit).
      #
      # TEMPORARY: continue-on-error keeps this step from failing the whole run
      # while CLOUDFLARE_API_TOKEN still lacks `Workers Scripts: Edit` (code 10000).
      # The Pages frontend has already deployed above, so the run goes green and the
      # follow-up step emits a ::warning instead. REMOVE continue-on-error once the
      # token carries Workers Scripts:Edit, so a real worker-deploy failure fails the run.
      - if: steps.secrets.outputs.ready == 'true'
        name: Deploy Worker (version-stamped)
        id: worker_deploy
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deliverables/F2/PWA/worker
          wranglerVersion: "3.114.17"
          command: deploy ${{ steps.wvars.outputs.env_flag }} --var PWA_VERSION:${{ steps.wvars.outputs.version }} --var WORKER_VERSION:${{ steps.wvars.outputs.worker_version }} --var PWA_BUILD_SHA:${{ steps.wvars.outputs.sha_short }}

      - if: steps.worker_deploy.outcome == 'failure'
        name: Warn — worker deploy skipped (non-blocking)
        run: |
          echo "::warning title=Worker deploy skipped::Version-stamped Worker deploy failed (likely CLOUDFLARE_API_TOKEN missing 'Workers Scripts: Edit' — error code 10000). The Pages frontend deployed fine. Fix the token + remove continue-on-error, or deploy the Worker manually."
