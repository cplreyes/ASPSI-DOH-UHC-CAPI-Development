name: CI — F2 PWA

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

# Cancel superseded runs on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app:
    name: app — typecheck + vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deliverables/F2/PWA/app
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # actions/setup-node pinned by tag; checkout is SHA-pinned per the
      # 2e11f16 security pass. If you want to also SHA-pin setup-node, run
      # `gh api repos/actions/setup-node/git/refs/tags/v4 -q .object.sha`
      # and replace `@v4` below.
      - uses: actions/setup-node@v4
        with:
          # Node 22: rollup-plugin-visualizer requires it, and the lockfile was
          # generated under Node 22's npm so older versions see drift.
          node-version: 22
          cache: npm
          cache-dependency-path: deliverables/F2/PWA/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npm test

      - name: Build (includes bundle-secrets check)
        # vite.config.ts now requires VITE_F2_PROXY_URL on production builds
        # (Issue #45). The staging Worker URL is public — fine to hardcode
        # for CI build verification. Real deploys (cf-pages-deploy.yml)
        # read from the repo secret.
        env:
          VITE_F2_PROXY_URL: https://f2-pwa-worker.hcw.workers.dev
        run: npm run build

  worker:
    name: worker — vitest (jwt + hmac + sentinel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deliverables/F2/PWA/worker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deliverables/F2/PWA/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (vitest run)
        run: npm test -- --run

  lighthouse:
    name: lighthouse — a11y + perf score gate (public surfaces)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deliverables/F2/PWA/app
    # vite's production env-guard (assertRequiredEnv in vite.config.ts) fires on
    # BOTH `vite build` and `vite preview`, so VITE_F2_PROXY_URL has to be set for
    # the whole job — the lhci-spawned preview server needs it too, not just the
    # build step. The staging Worker origin is public; real deploys read the secret.
    env:
      VITE_F2_PROXY_URL: https://f2-pwa-worker.hcw.workers.dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deliverables/F2/PWA/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Build the static dist lhci serves with `vite preview`. ubuntu-latest ships
      # google-chrome-stable; lhci's chrome-launcher finds it, and the config's
      # --no-sandbox flag covers the CI container. Gate config: lighthouserc.cjs.
      - name: Build
        run: npm run build

      - name: Lighthouse CI (a11y + perf score gate)
        run: npx lhci autorun --config=./lighthouserc.cjs

      # Surface the observed CI numbers (lhci is silent on passing assertions).
      # always() so they print even when an assertion fails — and so the margin
      # over each `warn` budget is visible when deciding whether to promote it
      # to a hard `error`. See scripts/lhci-summary.mjs + PERFORMANCE.md.
      - name: Lighthouse score summary (observed CI numbers)
        if: always()
        run: node scripts/lhci-summary.mjs
