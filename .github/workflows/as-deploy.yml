name: AS deploy — F2 PWA backend

# Permanent fix for the deploy-gap class (#294 / E4-PWA-014): the Cloudflare
# Worker + Pages frontend auto-deploy on merge (`cf-pages-deploy.yml`), but the
# Google Apps Script Web App had NO equivalent automation — so "merged → live"
# silently did not hold for backend changes. That gap shipped v2.0.1 handlers
# to the repo on 2026-05-09 while the deployed AS stayed on the 2026-05-04
# build, producing "Unknown admin action: admin_users_change_password" for any
# admin with password_must_change=true.
#
# This workflow closes that gap: on every push to main that touches the backend
# source, it rebuilds dist/Code.gs, runs the backend tests, then uses clasp to
# push the bundle and republish a NEW VERSION of the EXISTING prod deployment —
# keeping the same /exec URL the Worker's APPS_SCRIPT_URL secret points at.
#
# Path-filtered (unlike cf-pages' workflow_run gate) so we don't burn an AS
# version + clasp quota on unrelated main pushes. workflow_dispatch is included
# so a source-already-merged-but-never-deployed situation (exactly #294) can be
# deployed on demand without a dummy commit.
#
# ── ONE-TIME SETUP (Carl) — until these 3 secrets are set, the job SKIPS
#    cleanly with a ::warning (never a red ❌). Setup guide:
#    docs/superpowers/runbooks/2026-06-01-as-deploy-ci-setup.md
#      CLASPRC_JSON      contents of ~/.clasprc.json after `clasp login` as
#                        aspsi.doh.uhc.survey2.data@gmail.com (the AS owner)
#      AS_SCRIPT_ID      the F2-PWA-Backend (prod) script ID
#      AS_DEPLOYMENT_ID  the existing prod Web App deployment ID (keeps /exec
#                        stable — do NOT create a new deployment)

on:
  push:
    branches: [main]
    paths:
      - 'deliverables/F2/PWA/backend/src/**'
      - 'deliverables/F2/PWA/backend/apps-script/**'
      - 'deliverables/F2/PWA/backend/scripts/build.mjs'
      - '.github/workflows/as-deploy.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you deploying manually? (e.g. "source merged pre-CI, never pushed")'
        required: false
        default: 'manual redeploy'

# Never let two AS deploys race — a half-pushed Code.gs is worse than a queued
# one. Don't cancel an in-progress deploy; let it finish, then run the next.
concurrency:
  group: as-deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build, test, push + redeploy AS Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deliverables/F2/PWA/backend
    steps:
      # Gate: cleanly skip (don't fail) when deploy secrets aren't configured —
      # same pattern as cf-pages-deploy.yml. Until all three land, the manual
      # paste-into-AS-editor runbook (2026-05-19-e4-pwa-014-as-redeploy.md)
      # remains the deploy mechanism. When the secrets are set, this gate passes
      # automatically — no workflow edit required.
      - name: Verify deploy secrets are configured
        id: secrets
        working-directory: .
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          AS_SCRIPT_ID: ${{ secrets.AS_SCRIPT_ID }}
          AS_DEPLOYMENT_ID: ${{ secrets.AS_DEPLOYMENT_ID }}
        run: |
          missing=()
          [ -z "$CLASPRC_JSON" ] && missing+=("CLASPRC_JSON")
          [ -z "$AS_SCRIPT_ID" ] && missing+=("AS_SCRIPT_ID")
          [ -z "$AS_DEPLOYMENT_ID" ] && missing+=("AS_DEPLOYMENT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning title=AS auto-deploy skipped::Required secret(s) not set: ${missing[*]}. Set them in repo Settings → Secrets (see docs/superpowers/runbooks/2026-06-01-as-deploy-ci-setup.md) to enable auto-deploy. Manual paste-into-AS-editor remains the fallback."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.secrets.outputs.ready == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - if: steps.secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deliverables/F2/PWA/backend/package-lock.json

      # vitest (the test gate) is a devDependency — install before build/test.
      # The build itself is dependency-free pure node, but npm ci is cheap and
      # keeps the bundle reproducible against the lockfile.
      - if: steps.secrets.outputs.ready == 'true'
        name: Install
        run: npm ci

      # Build is the source of truth: dist/Code.gs is autogenerated and
      # gitignored, so it MUST be rebuilt in CI — never trust a stale checkout.
      - if: steps.secrets.outputs.ready == 'true'
        name: Build dist bundle
        run: npm run build

      # Gate the deploy on the backend's own tests. A bad AS push reaches every
      # field tablet's sync target; cheaper to fail here.
      - if: steps.secrets.outputs.ready == 'true'
        name: Test
        run: npm test

      # Sanity: refuse to deploy a bundle missing the v2.0.1 admin handlers.
      # This is the exact regression #294 was — a build that silently dropped
      # handlers (the stripCjsExport doc-comment bug, fixed in build.mjs) would
      # otherwise sail straight to prod. Fail loud instead.
      - if: steps.secrets.outputs.ready == 'true'
        name: Verify handlers present in bundle
        run: |
          for sym in adminUsersChangePassword adminUsersBulkImport admin_users_change_password admin_users_bulk_import; do
            if ! grep -q "$sym" dist/Code.gs; then
              echo "::error title=AS bundle incomplete::dist/Code.gs is missing '$sym' — build dropped a handler. Refusing to deploy. Check scripts/build.mjs ORDER + stripCjsExport."
              exit 1
            fi
          done
          echo "All required handlers present in dist/Code.gs."

      - if: steps.secrets.outputs.ready == 'true'
        name: Install clasp
        working-directory: .
        run: npm install -g @google/clasp@2.4.2

      # clasp auth lives in ~/.clasprc.json (global); project config in
      # .clasp.json (rootDir=dist → pushes the built Code.gs + appsscript.json
      # only). Both are written from secrets and never committed (.clasp.json is
      # gitignored). printf, not echo, to avoid mangling the JSON.
      - if: steps.secrets.outputs.ready == 'true'
        name: Write clasp auth + project config
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          AS_SCRIPT_ID: ${{ secrets.AS_SCRIPT_ID }}
        run: |
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          printf '{"scriptId":"%s","rootDir":"dist"}' "$AS_SCRIPT_ID" > .clasp.json

      # Push the bundle, then publish a NEW VERSION of the EXISTING deployment.
      # `clasp deploy -i <deploymentId>` redeploys that deployment id with a
      # fresh version — the /exec URL stays identical, so the Worker's
      # APPS_SCRIPT_URL secret keeps resolving. Do NOT run a bare `clasp deploy`
      # (that mints a new deployment + new URL and re-orphans the handlers,
      # which is the #294 failure mode all over again).
      - if: steps.secrets.outputs.ready == 'true'
        name: Push + redeploy existing version
        env:
          AS_DEPLOYMENT_ID: ${{ secrets.AS_DEPLOYMENT_ID }}
        run: |
          clasp push --force
          clasp deploy --deploymentId "$AS_DEPLOYMENT_ID" \
            --description "auto: ${GITHUB_SHA::7} via as-deploy.yml (run ${GITHUB_RUN_NUMBER})"

      - if: steps.secrets.outputs.ready == 'true'
        name: Summary
        working-directory: .
        run: |
          echo "### AS Web App redeployed ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment: \`${{ secrets.AS_DEPLOYMENT_ID }}\` (existing — /exec URL unchanged)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bundle: dist/Code.gs (handlers verified present)" >> "$GITHUB_STEP_SUMMARY"
